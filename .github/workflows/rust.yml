name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Validate asset pipeline
        run: cargo run -p ground_cli -- validate

      - name: Export smoke test
        run: cargo run -p ground_cli -- export exports/ci_check

      - name: Sprite generator smoke test
        run: cargo run -p ground_sprite_cli -- export exports/artgen_ci_check
